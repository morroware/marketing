<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Marketing Suite</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>Marketing Suite</h1>
        <p id="settingsSummary">Loading configuration...</p>
      </div>
      <div class="badge" id="providerBadge">Provider: --</div>
    </header>

    <main class="layout">
      <section class="card" id="dashboardCard">
        <h2>Dashboard</h2>
        <div id="metrics" class="grid"></div>
      </section>

      <section class="card">
        <h2>Campaign Planner</h2>
        <form id="campaignForm" class="stack">
          <input name="name" placeholder="Campaign name" required />
          <input name="channel" placeholder="Primary channel" required />
          <input name="objective" placeholder="Objective" required />
          <input name="budget" placeholder="Budget" type="number" min="0" step="0.01" />
          <div class="row2">
            <input name="start_date" type="date" />
            <input name="end_date" type="date" />
          </div>
          <textarea name="notes" placeholder="Notes"></textarea>
          <button type="submit">Create campaign</button>
        </form>
        <ul id="campaignList"></ul>
      </section>

      <section class="card">
        <h2>Competitor Watch</h2>
        <form id="competitorForm" class="stack">
          <input name="name" placeholder="Competitor name" required />
          <input name="channel" placeholder="Main channel" required />
          <input name="positioning" placeholder="Positioning" />
          <textarea name="recent_activity" placeholder="Recent activity"></textarea>
          <textarea name="opportunity" placeholder="Opportunity for us"></textarea>
          <button type="submit">Add competitor</button>
        </form>
        <ul id="competitorList"></ul>
      </section>

      <section class="card">
        <h2>AI Strategy Lab</h2>
        <div class="stack">
          <label>Market research</label>
          <input id="audience" placeholder="Audience" />
          <input id="goal" placeholder="Goal" />
          <button id="runResearch">Generate research brief</button>

          <label>Idea generator</label>
          <input id="topic" placeholder="Topic" />
          <input id="platformIdeas" placeholder="Platform" value="instagram" />
          <button id="runIdeas">Generate content ideas</button>

          <label>Content writer</label>
          <div class="row2">
            <select id="contentType">
              <option value="social_post">Social Post</option>
              <option value="caption">Caption</option>
              <option value="ad_copy">Ad Copy</option>
              <option value="video_script">Video Script</option>
              <option value="email">Email</option>
            </select>
            <select id="tone">
              <option value="professional">Professional</option>
              <option value="friendly">Friendly</option>
              <option value="direct-response">Direct Response</option>
              <option value="educational">Educational</option>
            </select>
          </div>
          <input id="contentPlatform" placeholder="Platform" value="facebook" />
          <input id="contentTopic" placeholder="Topic for drafted content" />
          <input id="contentGoal" placeholder="Conversion goal" />
          <button id="runContent">Generate ready-to-post content</button>

          <label>Posting schedule</label>
          <input id="calendarGoal" placeholder="Goal for the next 14 days" />
          <button id="runCalendar">Generate posting calendar</button>

          <pre id="aiOutput">AI output will appear here...</pre>
        </div>
      </section>

      <section class="card wide">
        <h2>Content Calendar</h2>
        <form id="postForm" class="stack">
          <div class="row2">
            <select name="campaign_id" id="campaignSelect"></select>
            <input name="platform" placeholder="Platform" required />
          </div>
          <div class="row2">
            <input name="content_type" placeholder="Content type" value="social_post" />
            <input name="title" placeholder="Title" required />
          </div>
          <textarea name="body" placeholder="Body" required></textarea>
          <div class="row2">
            <input name="cta" placeholder="CTA" />
            <input name="tags" placeholder="#tags" />
          </div>
          <div class="row2">
            <input type="datetime-local" name="scheduled_for" />
            <input type="number" name="ai_score" placeholder="AI score" min="0" max="100" />
          </div>
          <button type="submit">Save post</button>
        </form>
        <table>
          <thead>
            <tr><th>ID</th><th>Campaign</th><th>Platform</th><th>Type</th><th>Title</th><th>Status</th><th>When</th><th>Action</th></tr>
          </thead>
          <tbody id="postTable"></tbody>
        </table>
      </section>

      <section class="card wide">
        <h2>KPI Tracker</h2>
        <form id="kpiForm" class="stack">
          <div class="row3">
            <input name="channel" placeholder="Channel" required />
            <input name="metric_name" placeholder="Metric name" required />
            <input name="metric_value" placeholder="Metric value" type="number" step="0.01" required />
          </div>
          <div class="row2">
            <input name="logged_on" type="date" />
            <input name="note" placeholder="Note" />
          </div>
          <button type="submit">Log KPI</button>
        </form>
        <table>
          <thead><tr><th>Date</th><th>Channel</th><th>Metric</th><th>Value</th><th>Note</th></tr></thead>
          <tbody id="kpiTable"></tbody>
        </table>
      </section>
    </main>

    <script src="/assets/app.js"></script>
  </body>
</html>
